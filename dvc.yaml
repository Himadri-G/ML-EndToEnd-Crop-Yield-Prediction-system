stages:

  data_ingestion:
    cmd: python -m crop_yield_prediction.pipeline.stage_01_data_ingestion
    deps:
      - src/crop_yield_prediction/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion


  data_validation:
    cmd: python -m crop_yield_prediction.pipeline.stage_02_data_validation
    deps:
      - src/crop_yield_prediction/pipeline/stage_02_data_validation.py
      - artifacts/data_ingestion
      - config/schema.yaml
    outs:
      - artifacts/data_validation


  data_preprocessing:
    cmd: python -m crop_yield_prediction.pipeline.stage_03_data_preprocessing
    deps:
      - src/crop_yield_prediction/pipeline/stage_03_data_preprocessing.py
      - artifacts/data_validation
    outs:
      - artifacts/data_preprocessing


  model_training:
    cmd: python -m crop_yield_prediction.pipeline.stage_04_model_training
    deps:
      - src/crop_yield_prediction/pipeline/stage_04_model_training.py
      - artifacts/data_preprocessing
      - config/params.yaml
    outs:
      

      - artifacts/model_trainer
  model_evaluation:
    cmd: python -m crop_yield_prediction.pipeline.stage_05_model_evaluation
    deps:
      - src/crop_yield_prediction/pipeline/stage_05_model_evaluation.py

      - artifacts/model_trainer
    metrics:
      - artifacts/model_evaluation/metrics.json